name = "MiscYD"
keywords = ["math", "combinatorics", "additive-combinatorics", "convex-geometry", "measure-theory", "probability"]
defaultTargets = ["MiscYD"]

[leanOptions]
# Pretty-prints `fun a ↦ b`
pp.unicode.fun = true
# Don't assume a typo is a new variable
autoImplicit = false
relaxedAutoImplicit = false
# Enable all mathlib linters: automatically matches what mathlib uses...
weak.linter.mathlibStandardSet = true
# ...except the header linter.
weak.linter.style.header = false
# Switch off warnings generated by `sorry`
warn.sorry = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "d568c8c09630de097a046763c17b9ea99f95f950"

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

[[lean_lib]]
name = "MiscYD"
